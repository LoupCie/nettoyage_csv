name: Compilation Multi-Plateforme Native

on: [push]

jobs:
  build:
    name: Build sur ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            output_name: clean_csv_mac
            artifact_name: bin-mac
            libs: "-framework AppKit -framework UniformTypeIdentifiers"
          - os: windows-latest
            output_name: clean_csv_win.exe
            artifact_name: bin-win
            libs: "-lole32 -luuid -lcomctl32 -static -static-libgcc -static-libstdc++"

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer et Compiler NFD
        run: |
          git clone https://github.com/btzy/nativefiledialog-extended.git nfd_src
          cd nfd_src
          mkdir build
          cd build
          cmake -DNFD_BUILD_TESTS=OFF ..
          cmake --build . --config Release

      - name: Compilation du programme (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          g++ -O3 main.cpp -I nfd_src/src/include -L nfd_src/build/src -lnfd ${{ matrix.libs }} -o ${{ matrix.output_name }}

      - name: Compilation du programme (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          g++ -O3 main.cpp -I nfd_src/src/include -L nfd_src/build/src/Release -lnfd ${{ matrix.libs }} -o ${{ matrix.output_name }}

      - name: Téléverser l'exécutable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_name }}

  merge:
    name: Regroupement final
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Télécharger artefacts
        uses: actions/download-artifact@v4
        with:
          path: ./release
          pattern: bin-*
          merge-multiple: true

      - name: Créer le Pack Final
        uses: actions/upload-artifact@v4
        with:
          name: Pack-CSV-Final
          path: ./release